<h2>Create Title Abstract</h2>
<form [formGroup]="form" (ngSubmit)="save()">
  <!-- Title Abstract Main Fields -->
  <div>
    <label>Order No: <input formControlName="orderNo" /></label><br />
  </div>

  <div>
    <label>Search Date: <input type="date" formControlName="searchDate" /></label><br />
  </div>

  <div>
    <label>Effective Date: <input type="date" formControlName="effectiveDate" /></label><br />
  </div>

  <div>
    <label>Property: <input formControlName="propertyAddress" /></label><br />
  </div>

  <div>
    <label>Client: <input formControlName="client" /></label><br />
  </div>

  <div>
    <label>Client Ref No: <input formControlName="clientRefNo" /></label><br />
  </div>

  <div>
    <label>Product Type: <input formControlName="productType" /></label><br />
  </div>
  <div>
    <button type="submit">Save</button>
  </div>
</form>
